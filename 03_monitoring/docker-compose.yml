services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: walg-postgres-mon
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: walg_test
      PGPASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
      # WAL-G S3 Configuration
      WALG_S3_PREFIX: s3://walg-backups
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ENDPOINT: http://minio:9000
      AWS_S3_FORCE_PATH_STYLE: "true"
      AWS_REGION: us-east-1
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql:/sql:ro
    ports:
      - "5432:5432"
      - "9351:9351"
    command: >
      postgres
      -c wal_level=replica
      -c archive_mode=on
      -c archive_command='wal-g wal-push "%p"'
      -c archive_timeout=60
    depends_on:
      - minio

  minio:
    image: minio/minio:latest
    container_name: walg-minio-mon
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  create-bucket:
    image: minio/mc:latest
    container_name: walg-create-bucket-mon
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin) do echo 'Waiting for MinIO...' && sleep 1; done;
      /usr/bin/mc mb myminio/walg-backups || true;
      exit 0;
      "

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@postgres:5432/walg_test?sslmode=disable"
    depends_on:
      - postgres

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - postgres

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards/walg_dashboard.json:/etc/grafana/provisioning/dashboards/walg_dashboard.json:ro
    depends_on:
      - prometheus

volumes:
  pg_data:
  minio_data:
